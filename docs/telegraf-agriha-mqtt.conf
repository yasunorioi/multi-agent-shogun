################################################################################
# Telegraf Configuration: Agriculture IoT MQTT Consumer
#
# This is a production-ready configuration for ingesting agriculture sensor
# data from multiple houses via MQTT with topic parsing and JSON payload parsing.
#
# Topics supported:
#   - agriha/{house_id}/sensor/DS18B20  → Temperature sensors
#   - agriha/farm/weather/misol         → Weather station
#   - agriha/{house_id}/relay/state     → 8-channel relay states
#   - agriha/{house_id}/di/{circuit}    → Digital inputs (contactors, switches)
#   - agriha/daemon/status              → System status/heartbeat
#
# Database: InfluxDB (configured in [outputs.influxdb])
# MQTT Broker: Mosquitto (or compatible)
#
################################################################################

[global_tags]
  # Global tags applied to ALL metrics from this Telegraf instance
  region = "agriha"
  environment = "production"

[agent]
  # How often to gather measurements (minimum recommended for IoT: 10s)
  interval = "15s"
  # How long to wait for a write to succeed before giving up
  metric_batch_size = 1000
  metric_buffer_limit = 10000
  flush_interval = "10s"
  # Omit hostname tag to reduce cardinality
  omit_hostname = false

################################################################################
# INPUT: MQTT Consumer - Agriculture IoT Sensors
################################################################################

[[inputs.mqtt_consumer]]
  # ============ MQTT Server Connection ============

  # MQTT broker address (single or multiple for failover)
  servers = ["tcp://mosquitto:1883"]

  # Protocol version (3 = 3.1, 4 = 3.1.1, 5 = 5.0)
  protocol = "tcp"

  # Client identifier for MQTT broker
  # Use stable, unique ID across restarts for persistent session support
  client_id = "telegraf_agriha_consumer"

  # Connection timeout for initial TCP handshake
  connection_timeout = "30s"

  # Keep-alive interval in seconds (broker closes idle connections > 2× this)
  # Minimum value: 1 second
  # Recommended: 10-60 seconds
  keepalive = 10

  # Timeout waiting for keep-alive PING response
  ping_timeout = "5s"

  # ============ Topic Subscription ============

  # Topics to subscribe to (MQTT wildcards: + = single level, # = multi-level)
  #
  # +       Matches exactly one topic segment
  #         Example: agriha/+/sensor/DS18B20 matches agriha/h01/sensor/DS18B20
  #
  # #       Matches zero or more topic segments (must be at END)
  #         Example: agriha/+/di/# matches agriha/h01/di/ch1, agriha/h01/di/ch2, etc
  #
  topics = [
    "agriha/+/sensor/DS18B20",      # All houses' temperature sensors
    "agriha/farm/weather/misol",    # Farm weather station (static topic)
    "agriha/+/relay/state",         # All houses' relay control states
    "agriha/+/di/+",                # All houses' digital input channels
    "agriha/daemon/status"          # System daemon status/heartbeat
  ]

  # ============ Data Format Parsing ============

  # All MQTT payloads from subscribed topics are JSON
  data_format = "json"

  # For nested JSON, extract specific path using GJSON syntax
  # Examples:
  #   json_query = "data"              # Extract "data" object from root
  #   json_query = "sensors.0"         # Extract first element of sensors array
  #   json_query = "payload.readings"  # Extract nested path
  #
  # Leave empty ("") to parse entire JSON payload as fields/tags
  json_query = ""

  # JSON object keys that should become TAGS (not fields)
  #
  # Tags are:
  #   - Indexed by InfluxDB (fast queries)
  #   - Lower cardinality (IDs, types, categories)
  #   - Text values
  #
  # Fields are:
  #   - Stored as time-series values (numbers, strings)
  #   - Higher cardinality (sensor readings, values)
  #   - What you typically query over time
  #
  # Example payload:
  #   {"value": 22.5, "device_id": "DS001", "status": "ok"}
  #
  # With tag_keys = ["device_id", "status"]:
  #   measurement,device_id=DS001,status=ok value=22.5
  #
  tag_keys = [
    "device_id",        # Sensor identifier
    "device_type",      # Type of sensor
    "model",            # Hardware model
    "status"            # Status string from payload
  ]

  # JSON object keys that should remain as STRING (not converted to numbers)
  #
  # By default, numeric-looking values are converted to numbers.
  # Use this for values that look numeric but should be strings:
  #   - Firmware versions (e.g., "1.2.3")
  #   - Device serial numbers (e.g., "001234")
  #   - Status codes (e.g., "200", "404")
  #   - Enum strings (e.g., "on", "off")
  #
  json_string_fields = [
    "firmware_version",
    "device_model",
    "status_code",
    "serial_number"
  ]

  # ============ Topic Parsing: Extract Structure ============

  # Topic parsing extracts segments from MQTT topic path into tags/measurements
  #
  # Syntax:
  #   topic = "agriha/house_id/sensor/metric"
  #
  #   Named segments (house_id, metric) → extracted as tags
  #   Underscores (_) → ignored/skipped
  #   measurement = "sensor"  → static measurement name
  #   tags = "house_id"       → topic segment becomes this tag
  #
  # Without topic parsing, entire topic becomes a tag:
  #   measurement,topic="agriha/h01/sensor/DS18B20" ...
  #
  # With topic parsing:
  #   sensor,house_id=h01,metric=DS18B20 ...
  #
  # ---- Temperature Sensor: agriha/{house_id}/sensor/DS18B20 ----

  [[inputs.mqtt_consumer.topic_parsing]]
    # Topic pattern to match (case-sensitive)
    topic = "agriha/house_id/sensor/metric"

    # InfluxDB measurement name (from topic or static)
    # If metric is dynamic (DS18B20, HTU21D, etc), use measurement = "metric"
    # If all same sensor type, use measurement = "temperature"
    measurement = "sensor"

    # Extract these topic segments as tags
    # Single tag: tags = "house_id"
    # Multiple:   tags = ["house_id", "metric"]
    tags = ["house_id", "metric"]

  # ---- Weather Station: agriha/farm/weather/misol ----

  [[inputs.mqtt_consumer.topic_parsing]]
    # Static topic, no wildcards
    topic = "agriha/_/weather/station"
    measurement = "weather"
    tags = "station"  # Results in station=misol

  # ---- Relay State: agriha/{house_id}/relay/state ----

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "agriha/house_id/relay/state"
    measurement = "relay"
    tags = "house_id"

  # ---- Digital Input: agriha/{house_id}/di/{circuit} ----

  [[inputs.mqtt_consumer.topic_parsing]]
    topic = "agriha/house_id/di/circuit"
    measurement = "di"           # di = digital input
    tags = ["house_id", "circuit"]  # Both become tags

  # ---- System Daemon: agriha/daemon/status ----

  [[inputs.mqtt_consumer.topic_parsing]]
    # No tags from topic (data comes from JSON payload only)
    topic = "agriha/daemon/status"
    measurement = "daemon"
    tags = []

  # Remove default "topic" tag to keep InfluxDB tag cardinality low
  # Without this, every metric includes: topic="agriha/h01/sensor/DS18B20"
  # With topic parsing above, this is redundant
  topic_tag = ""

  # ============ Quality of Service & Reliability ============

  # MQTT QoS (Quality of Service) level for message delivery
  #
  # 0 = At Most Once (fire and forget)
  #     - Fastest, may lose messages
  #     - Use for: frequent metrics ok to lose (e.g., temperature readings every second)
  #
  # 1 = At Least Once (guaranteed delivery, may duplicate)
  #     - Medium speed, reliable
  #     - Default choice for most IoT (temperature, humidity, weather)
  #     - May see duplicate messages on reconnect, but no loss
  #
  # 2 = Exactly Once (guaranteed single delivery)
  #     - Slowest, guaranteed no duplicates
  #     - Use for: critical state changes (relay activation, pump start/stop)
  #
  # Recommendation: Use QoS 1 for sensors, QoS 2 for commands
  qos = 1

  # Enable persistent client session
  #
  # If true:
  #   - MQTT broker stores undelivered messages (QoS 1-2) for this client_id
  #   - On reconnection with same client_id, broker resends missed messages
  #   - Prevents data loss during network interruptions
  #
  # If false:
  #   - Each connection is fresh, no message recovery
  #   - Fast reconnect but may lose data
  #
  # IMPORTANT: Use stable, unique client_id for this to work!
  # If you change client_id after enabling persistent_session, old messages are orphaned
  persistent_session = true

  # Maximum number of unacknowledged messages to buffer in memory
  #
  # When QoS=1 and message delivery is slow:
  #   - Telegraf buffers messages waiting for broker ACK
  #   - This setting limits buffer size
  #
  # Higher value = more buffering during network issues, more memory
  # Lower value = less memory, but may lose messages if queue fills
  #
  # Default: 1000 (reasonable for typical IoT)
  # For high-frequency sensors: 1000-10000
  # For low-frequency: 100-500
  max_undelivered_messages = 1000

  # ============ Optional: Authentication ============
  # Uncomment if your MQTT broker requires username/password
  #
  # username = "telegraf"
  # password = "secure_password_or_secret_key"

  # ============ Optional: TLS/SSL Security ============
  # Uncomment if connecting to MQTT broker with TLS encryption
  #
  # tls_ca = "/etc/telegraf/ca.crt"       # CA certificate
  # tls_cert = "/etc/telegraf/cert.crt"   # Client certificate
  # tls_key = "/etc/telegraf/key.key"     # Client private key
  # tls_version = "1.2"                   # Minimum TLS version
  # insecure_skip_verify = false          # Verify broker certificate


################################################################################
# OUTPUT: InfluxDB v2.x
################################################################################

[[outputs.influxdb_v2]]
  # InfluxDB API URL (with /api/v2/write path added automatically)
  urls = ["http://influxdb:8086"]

  # InfluxDB bucket name (where metrics are stored)
  bucket = "agriculture"

  # Organization (required for v2)
  organization = "agriha-farm"

  # Token for authentication (use secret management in production)
  token = "your_influxdb_token_here"

  # Timeout for API requests
  timeout = "10s"


################################################################################
# OPTIONAL: Monitoring (Telegraf self-metrics)
################################################################################

[[outputs.influxdb_v2]]
  # Optional: Send Telegraf internal metrics to separate bucket
  urls = ["http://influxdb:8086"]
  bucket = "telegraf_system"
  organization = "agriha-farm"
  token = "your_influxdb_token_here"

  # Only output internal Telegraf metrics (prefixed with "internal_")
  namepass = ["internal_*"]


################################################################################
# OPTIONAL: File Output (useful for debugging)
################################################################################

# Uncomment to log all metrics to file for debugging
# [[outputs.file]]
#   files = ["/var/log/telegraf/agriha-metrics.json"]
#   data_format = "json"


################################################################################
# OPTIONAL: Logging Configuration
################################################################################

[logging]
  # Set to "debug" for verbose logging, "info" for normal, "error" for warnings only
  level = "info"
  # Suppress log messages from specific plugins (separate with commas)
  suppress_errors = false

################################################################################
# Notes for Deployment
################################################################################

# 1. Start Telegraf:
#    telegraf --config telegraf-agriha-mqtt.conf
#
# 2. Verify configuration:
#    telegraf --config telegraf-agriha-mqtt.conf --test
#
# 3. Check logs:
#    journalctl -u telegraf -f
#    or in systemd: /var/log/telegraf/telegraf.log
#
# 4. Validate MQTT connectivity:
#    mosquitto_sub -h mosquitto -t 'agriha/#' -v
#
# 5. Query InfluxDB:
#    influx query 'from(bucket:"agriculture") |> range(start: -1h)'
#
# 6. Common Issues:
#    - "Topic parsing not working" → Verify topic pattern matches exactly (case-sensitive)
#    - "JSON fields not parsed" → Check JSON is valid, verify data_format="json"
#    - "Memory growing" → Reduce max_undelivered_messages or check broker connectivity
#    - "Duplicate metrics" → Expected with QoS 1; InfluxDB deduplicates on unique tag combo
