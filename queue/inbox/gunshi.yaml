  description: |
    ■ 戦略分析: rotation-planner「委託業務モデル」拡張設計

    【背景】
    出荷管理ロット管理システム設計中に、rotation-plannerに「荷主」と「委託業務」の
    概念が欠落していることが判明。現状 users ≒ 荷主 で回っているが、実際は:
    - 地主（荷主）と作業者（受託者）が異なる場合がある
    - 委託の粒度がバラバラ（耕起だけ / 管理全部 / コンバイン刈り取りだけ）
    - ほ場単位で混在（F001は自作、F002は委託）
    - 年度で変わる（今年は委託、来年は自作）

