  description: |
    ■ 戦略分析: shogunシステム2ch互換CGI全面置換設計

    【背景 — 前回分析からの進展】
    前回（2026-03-18）の分析で「CMD=スレ/subtask=レスのスキーマ統合はやらない」と結論した。
    その判断は正しい。構造化データを非構造化テキストに潰すのは退化。

    しかし今回の構想はスキーマ統合ではなく「通信レイヤーの全面2ch化」:
    - YAML inbox通信 → 2chスレへの書き込み（bbs.cgi POST）
    - tmux send-keys通知 → bbs.cgi POST + send-keysフック（実装済み）
    - dashboard.md → 管理板の固定スレ（>>1-10に最新状態、更新時書き換え）
    - 没日録DBスキーマ → 変更なし（thread_repliesに通信ログが蓄積される副産物）
    - JDimが殿の統一UI（閲覧+書き込み+対話）

    【本日の実装成果（既に動いている）】
    1. JDimからの書き込み → dat_server.pyのbbs.cgi POSTが処理
    2. 殿(shogun)の書き込み → send-keysで老中ペインに対話指示を流し込み
    3. 老中がcurl経由でbbs.cgiにレス → 殿のペインにsend-keys通知
    4. cp932エンコード対応、DATファイルID安定化（hashlib.md5）
    5. 殿↔老中の2chスレ上対話ループが実際に稼働中

    【分析項目（5つ全て所見を出せ）】

    1. **YAML inbox → 2chスレ置換の設計（最重要）**
       - 現行: 老中がashigaru{N}.yamlにタスク記入 + send-keysで通知
       - 新案: 老中が管理板にスレ立て（=タスク指示）+ send-keysで通知
       - 足軽はスレを読んでタスク内容を把握、完了報告もスレにレス
       - YAML通信の何を2chに移し、何をYAML/DBに残すべきか
       - status管理（assigned/in_progress/done）をスレ上でどう表現するか

    2. **dashboard.md → 管理板固定スレ設計**
       - >>1-10にダッシュボード情報を固定表示
       - 更新時の書き換え方式（レス削除+再投稿? 特殊コマンド?）
       - 老中のdashboard.md更新フローをどう変えるか

    3. **権限・板設計の拡張**
       - 現行WRITABLE_BOARDS = {"zatsudan"} のみ
       - 管理板への書き込み許可が必要（老中・足軽）
       - 板ごとの書き込み権限設計（FROM欄のagent認証で制御）
       - 新規板の要否（タスク専用板? 報告板?）

    4. **老中ワークフローの変更設計**
       - 現行karo.mdのワークフロー12ステップのうち、何が変わるか
       - shogun_to_karo.yaml → 殿が管理板に直接スレ立て?
       - roju_reports.yaml → 足軽が管理板スレにレス?
       - お針子への監査依頼もスレ経由?

    5. **移行戦略とリスク**
       - 既存YAML通信との共存期間は必要か
       - 段階的移行（Phase 0: 雑談板対話のみ → Phase 1: タスク指示 → Phase 2: 全面置換）
       - ロールバック可能性
       - 「やらない」部分の明示（何を2ch化せず残すか）

