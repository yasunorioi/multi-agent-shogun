  description: |
    ■ 戦略分析: ベクトル検索（sqlite-vec + Ruri v3）導入設計

    【背景・参考記事】
    sui-memory (https://zenn.dev/noprogllama/articles/7c24b2c2410213) の設計を参考に、
    没日録DB / agent-swarm DBにベクトル検索を導入する。

    sui-memoryの要点:
    - SQLite FTS5(trigram) + sqlite-vec + Ruri v3-310m のハイブリッド検索
    - RRF（Reciprocal Rank Fusion）でスコア統合
    - 時間減衰（半減期30日）
    - LLM要約なし（生データをチャンク分割して保存）
    - 検索100ms前後、7,059件のメモリで実用的
    - 外部依存: sentence-transformers, sqlite-vec のみ

    現行の没日録FTS5は既に動いている（migrate_fts5.py済み）。
    これにベクトル検索レイヤーを追加する設計を求む。

    【分析項目（5つ全て所見を出せ）】

    1. **アーキテクチャ設計（最重要）**
       - 没日録DB vs agent-swarm DB のどちらに入れるか（両方?）
       - 既存FTS5とベクトル検索の共存方式
       - RRFの実装（FTS5 BM25スコア + ベクトルコサイン類似度の統合）
       - 時間減衰の設計（半減期の最適値。没日録の場合30日でいいか?）
       - チャンク分割戦略（スレのレス単位? cmd単位? 複数レスまとめ?）

    2. **モデル選定**
       - Ruri v3-310m（日本語特化、CPU動作可能）の適合性
       - VPS（さくら 4コア/4GB）での推論性能
       - 代替モデル候補（multilingual-e5-small等、より軽量な選択肢）
       - ベクトル次元数とsqlite-vecの制約

    3. **実装設計**
       - sqlite-vecのインストール・セットアップ
       - ベクトル化のタイミング（書き込み時? バッチ? 検索時オンデマンド?）
       - 既存CLIへの統合（botsunichiroku.py search の拡張）
       - agent-swarm CLIへの統合

    4. **コスト・パフォーマンス試算**
       - 没日録の現行データ量（cmd/subtask/report/reply/diary）
       - agent-swarmの予想データ増加ペース
       - Ruri v3のCPU推論時間（1件あたり / バッチ）
       - メモリ使用量（モデルロード + sqlite-vecインデックス）
       - VPS 4GBメモリで他サービスと共存可能か

    5. **移行・導入戦略**
       - Phase 0: sqlite-vec + 最小モデルで没日録searchに統合
       - Phase 1: agent-swarm側にも展開
       - Phase 2: 時間減衰・RRF最適化
       - 既存FTS5検索が壊れないことの保証
       - ロールバック方式

    【殿の制約・好み】
    - マクガイバー精神: SQLite + Python、最小構成
    - 月額忌避: 外部API不使用（ローカル推論のみ）
    - VPSはさくら 4コア/4GB。他サービスも動いている
    - 既存のFTS5検索は壊すな
    - 「バージョンアップしてでも入れたい」と殿が明言

    【成果物】
    - docs/shogun/vector_search_design.md に設計書を出力
    - queue/inbox/roju_reports.yaml に報告
    - Wave分解案（段階的実装計画）
    - モデル比較表（メモリ・速度・精度）
