      - "老中がスレ上の報告を見てDB更新を怠る可能性（お針子監査項目に追加で軽減）"
      - "http.serverのシングルスレッド制限（同時POST時のブロッキング）"
      - "Phase 2移行時のYAML→2ch切り替え失敗（デュアルライト期間で検証）"

