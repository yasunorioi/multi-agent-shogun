decomposition:
  five_questions:
    purpose: |
      BKG ntripcaster 0.1.5のCソースをZig 0.14でフルリライトし、
      RPi/VPSでのシングルバイナリデプロイを実現する。
    breakdown: |
      Phase 2(v1最小実装)は4モジュールグループに分解可能:
      (A)プロトコル+設定、(B)リレーエンジン、(C)サーバー統合、(D)相互運用テスト。
      A→B→Cはシリアル依存、Dは並列可能。
    headcount: |
      1-2足軽。Phase 2全体は1人で3-5日相当。
      モジュール分割が明確なため2人並列も可能（A+BとCを分担）。
    perspective: |
      Bloom L4-L5（分析+評価）。既存プロトコル仕様の忠実な再実装。
      ただしI/Oモデル選択やリングバッファ設計はL5の判断が必要。
    risk: |
      中リスク。RTKLIB互換性が最大のリスク。
      Phase 2完了条件にstr2str相互運用テストを含めることで管理。
      C版との並行稼働期間を設けて段階的に移行。

