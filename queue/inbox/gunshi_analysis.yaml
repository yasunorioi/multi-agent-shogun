  strategy_analysis:
    alternatives:
      - name: "案A: 3フェーズ段階移行（Phase 0→1→2）【推奨】"
        pros:
          - "各フェーズで独立してロールバック可能"
          - "Phase 0は既存を一切壊さない（板追加のみ）"
          - "Phase 1のデュアルライトで信頼性検証"
          - "殿がJDimで全通信を閲覧可能になる"
          - "SQLite WALでYAMLの排他制御問題を根本解消"
        cons:
          - "Phase 1のデュアルライト期間は二重管理コスト"
          - "全面完了（Phase 2）まで8 subtask"
          - "bbs.cgiがSPOFになる"
        score: 9
      - name: "案B: 即時全面置換（ビッグバン移行）"
        pros:
          - "デュアルライト期間不要。移行コスト最小"
          - "即座にJDim統一UIを実現"
        cons:
          - "ロールバック困難"
          - "エッジケース未検証で本番移行"
          - "足軽のinstructions一括更新が必要"
        score: 4
      - name: "案C: 部分移行（殿↔老中のみ2ch化、足軽はYAML維持）"
        pros:
          - "影響範囲が狭い"
          - "足軽のinstructions変更不要"
        cons:
          - "通信方式が混在し続ける"
          - "殿から足軽の状況が見えない（改善なし）"
          - "中途半端。North Starに到達しない"
        score: 5
      - name: "案D: やらない（YAML維持）"
        pros:
          - "リスクゼロ。変更コストゼロ"
        cons:
          - "YAMLの排他制御問題が残る"
          - "殿からタスク状況が見えないまま"
          - "JDim統一UIの実現が遠のく"
        score: 3
    recommendation: "案A: 3フェーズ段階移行（Phase 0→1→2）"
    recommendation_reason: |
      既に殿↔老中のJDim対話が稼働中（bbs.cgi + send-keysフック）。
      この実績を足軽・軍師・お針子に拡大するのは自然な延長線上。
      Phase 0は既存を一切壊さず新板を追加するだけなので低リスク。
      Phase 1のデュアルライトで信頼性を検証してからYAML廃止に進める。
      前回分析の三層分離（保存/検索/表示）に「通信」レイヤーを追加する
      拡張であり、アーキテクチャの一貫性を保てる。

