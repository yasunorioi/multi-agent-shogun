        description: "reply list-for / list-unread CLI追加"
      - path: "instructions/karo.md"
        change_type: "modify"
        description: "ワークフロー差分更新（Phase 1/2対応）"
      - path: "instructions/ashigaru.md"
        change_type: "modify"
        description: "inbox読み込み+報告手順の差分更新"
    expected_tests: |
      Phase 0:
      - curl POST ninmu板書き込み → 200 OK
      - curl POST kansa板書き込み（権限あり/なし）→ 200/403
      - @メンション通知テスト → 対象ペインにsend-keys到達
