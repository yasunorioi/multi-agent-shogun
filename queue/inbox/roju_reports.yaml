  findings:
  - category: structural
    detail: '■ 2F→1F逆通知の経路不明確

      1F→2F（納品POST）は明記されているが、2F→1F（差し戻し通知）の具体的メカニズムが未記載。

      FAILの場合、足軽はどう知るのか？ BBS通知(notify_exec)? send-keys? 定期読み取り？

      → 修正案: §3.1に「kenshu_gate FAIL → 任務板にリジェクト通知POST → 1Fにsend-keys/notify_exec」を追記


      ■ 没日録DBへの2F合議結果の書き戻し

      2Fエージェントは没日録DB書き込み権限がない（権限マトリクス）。

      合議結果（PASS/FAIL+理由）は老中が手動で没日録に転記する必要がある。

      この手動転記が抜けると没日録とBBSが乖離し「正データは没日録」原則が崩れる。

      → 修正案: 老中がkenshu_gateを読んだ時点で自動的にbotsunichiroku audit recordに記録するスクリプト/フックを設計


      ■ 合議のタイブレーカー

      お針子PASS+軍師FAILの場合（またはその逆）、誰がkenshu_gateに最終判定を書くか不明。

      → 修正案: §4.3に「合議不一致時は老中裁定。老中判断困難な場合は殿にエスカレーション」を追記

      '
    verdict: WARNING
  - category: harness
    detail: '4要素とも概ねカバーされている。2点の穴:


      ■ 合議の最低品質保証（アーキテクチャ制約の穴）

      >>50強制判定は上限だが、下限がない。レス1件で「PASS」と書いて終わることが可能。

