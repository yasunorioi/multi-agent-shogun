      ■ pipe→BBSの対応がやや強引

      POSIX pipeはpoint-to-point(producer-consumer)。BBSはpub/sub(1:N)。

      より正確な対応: BBS板 ≒ message queue (POSIX mq_open), スレッド ≒ named pipe。

      実害はないが、設計議論時に混乱の元になりうる。


      ■ exit code未対応

      POSIXプロセスは必ずexit codeを返す。足軽の「完了通知」に相当するが、

      納品IFのtest_result(PASS/FAIL)がこれに該当する。明示的に対応表に追加すると良い。


      ■ fork()未対応

