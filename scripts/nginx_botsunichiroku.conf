# nginx_botsunichiroku.conf — 没日録2ch DATサーバー リバースプロキシ設定
#
# 配置先 (例):
#   sudo cp scripts/nginx_botsunichiroku.conf /etc/nginx/conf.d/botsunichiroku.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# アクセスURL:
#   http://localhost/botsunichiroku/bbsmenu.html   → JDim外部板URL
#   http://localhost/botsunichiroku/<板>/subject.txt
#   http://localhost/botsunichiroku/<板>/dat/<id>.dat
#
# dat_server.py 起動方法:
#   python3 /home/yasu/multi-agent-shogun/scripts/dat_server.py --port 8823
#
# JDim設定:
#   「外部板」→ http://localhost/botsunichiroku/ を追加

server {
    listen 80;
    server_name localhost;

    # 没日録2ch DATサーバー リバースプロキシ
    location /botsunichiroku/ {
        proxy_pass         http://127.0.0.1:8823/;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        # JDim互換: Content-Typeのcharsetを保持
        proxy_pass_header  Content-Type;

        # タイムアウト設定
        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;

        # バッファリング無効（レスポンスをそのままJDimに渡す）
        proxy_buffering    off;
    }
}
