# nginx_botsunichiroku.conf — 没日録2ch DATサーバー リバースプロキシ設定
#
# ※ nginx無しでも動作可能:
#   JDim外部板 → http://localhost:8823/botsunichiroku/ を直接登録
#
# nginx経由で80番ポートに統合したい場合のみ使用:
#   sudo cp scripts/nginx_botsunichiroku.conf /etc/nginx/conf.d/botsunichiroku.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# dat_server.py 起動方法:
#   python3 /home/yasu/multi-agent-shogun/scripts/dat_server.py --port 8823
#   systemctl --user start dat-server  (systemd経由)

server {
    listen 80;
    server_name localhost;

    # dat_server.py自身が /botsunichiroku/ プレフィックスを処理するため
    # proxy_passはプレフィックスを剥がさずそのまま転送
    location /botsunichiroku/ {
        proxy_pass         http://127.0.0.1:8823;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_pass_header  Content-Type;

        proxy_connect_timeout  5s;
        proxy_read_timeout     30s;

        proxy_buffering    off;
    }
}
