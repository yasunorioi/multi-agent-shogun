services:
  kousatsu:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ../../data/botsunichiroku.db:/data/botsunichiroku.db:rw
      - ../../instructions:/app/static/instructions:ro
      - ../../context:/app/static/context:ro
    environment:
      - BOTSUNICHIROKU_DB=/data/botsunichiroku.db
      - INDEX_DB=/data/search_index.db
